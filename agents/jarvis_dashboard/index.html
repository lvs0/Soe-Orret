<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JARVIS — Command Center</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    
    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      font-family: 'Inter', system-ui, sans-serif;
      background: #07070d;
      color: #fff;
      user-select: none;
    }

    /* ─── Ambient Background ─────────────────────────────── */
    #bg {
      position: fixed; inset: 0; z-index: 0;
      background: radial-gradient(ellipse 100% 80% at 50% 0%, rgba(74,130,220,0.07) 0%, transparent 60%),
                  radial-gradient(ellipse 80% 60% at 80% 100%, rgba(245,166,35,0.04) 0%, transparent 50%),
                  #07070d;
    }

    /* ─── Grid ───────────────────────────────────────────── */
    #app {
      position: relative; z-index: 1;
      display: grid;
      grid-template-rows: 52px 1fr 44px;
      grid-template-columns: 260px 1fr 280px;
      height: 100vh;
    }

    /* ─── Top Bar ───────────────────────────────────────── */
    #topbar {
      grid-column: 1 / -1;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 24px;
      border-bottom: 1px solid rgba(255,255,255,0.04);
    }

    #logo {
      font-size: 15px; font-weight: 600; letter-spacing: 0.15em;
      color: rgba(255,255,255,0.9);
    }
    #logo span { color: rgba(74,158,255,0.8); }

    #top-actions { display: flex; gap: 6px; }
    .action-btn {
      width: 36px; height: 36px;
      display: flex; align-items: center; justify-content: center;
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 10px; cursor: pointer; font-size: 15px;
      background: transparent; color: rgba(255,255,255,0.4);
      transition: all 0.2s; position: relative;
    }
    .action-btn:hover { 
      background: rgba(255,255,255,0.05); color: rgba(255,255,255,0.8);
      border-color: rgba(255,255,255,0.12);
    }
    .action-btn.on {
      background: rgba(74,158,255,0.15);
      border-color: rgba(74,158,255,0.3);
      color: rgba(74,158,255,0.9);
    }
    .action-btn.danger:hover {
      background: rgba(231,76,60,0.15);
      border-color: rgba(231,76,60,0.3);
      color: rgba(231,76,60,0.9);
    }
    .action-btn[title]:hover::after {
      content: attr(title);
      position: absolute; top: calc(100% + 8px); left: 50%; transform: translateX(-50%);
      background: rgba(10,10,20,0.95);
      border: 1px solid rgba(255,255,255,0.08);
      padding: 4px 10px; border-radius: 6px;
      font-size: 11px; white-space: nowrap; color: rgba(255,255,255,0.6);
      pointer-events: none; font-family: 'Inter', sans-serif;
    }

    /* ─── Left Panel ────────────────────────────────────── */
    #left-panel {
      border-right: 1px solid rgba(255,255,255,0.04);
      display: flex; flex-direction: column; overflow: hidden;
    }

    .panel-tabs {
      display: flex; padding: 10px 10px 0;
      border-bottom: 1px solid rgba(255,255,255,0.04);
    }
    .p-tab {
      flex: 1; padding: 8px 4px; text-align: center;
      font-size: 10px; font-weight: 500; letter-spacing: 0.05em;
      color: rgba(255,255,255,0.25); cursor: pointer;
      border-bottom: 2px solid transparent; margin-bottom: -1px;
      transition: all 0.2s;
    }
    .p-tab:hover { color: rgba(255,255,255,0.5); }
    .p-tab.active { color: rgba(74,158,255,0.8); border-bottom-color: rgba(74,158,255,0.6); }

    #left-content { flex: 1; overflow-y: auto; padding: 14px 12px; }
    #left-content::-webkit-scrollbar { width: 3px; }
    #left-content::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.06); border-radius: 2px; }

    /* Task items */
    .task {
      padding: 10px 12px; margin-bottom: 6px;
      border-radius: 10px; border: 1px solid rgba(255,255,255,0.04);
      background: rgba(255,255,255,0.02); cursor: pointer;
      transition: all 0.2s;
    }
    .task:hover { background: rgba(255,255,255,0.04); border-color: rgba(255,255,255,0.08); }
    .task-head { display: flex; align-items: center; gap: 8px; }
    .t-dot {
      width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0;
    }
    .t-dot.running { background: #2ecc71; box-shadow: 0 0 6px #2ecc71; animation: blink 1.5s ease-in-out infinite; }
    .t-dot.pending { background: rgba(255,255,255,0.2); }
    .t-dot.done { background: rgba(74,158,255,0.6); }
    .t-dot.failed { background: #e74c3c; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.4} }
    .t-name { font-size: 12px; font-weight: 500; flex: 1; }
    .t-tag { font-size: 9px; padding: 2px 6px; border-radius: 4px; font-weight: 500; }
    .t-tag.running { background: rgba(46,204,113,0.15); color: #2ecc71; }
    .t-tag.pending { background: rgba(255,255,255,0.05); color: rgba(255,255,255,0.3); }
    .t-desc { font-size: 11px; color: rgba(255,255,255,0.3); margin-top: 5px; }

    /* Plan */
    .plan-title { font-size: 12px; font-weight: 600; margin-bottom: 10px; }
    .plan-bar { height: 3px; background: rgba(255,255,255,0.06); border-radius: 2px; overflow: hidden; margin-bottom: 12px; }
    .plan-fill {
      height: 100%; width: 0%;
      background: linear-gradient(90deg, rgba(74,158,255,0.8), rgba(245,166,35,0.8));
      border-radius: 2px; transition: width 1s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .plan-step {
      display: flex; align-items: center; gap: 8px;
      padding: 5px 0; font-size: 11px; color: rgba(255,255,255,0.25);
    }
    .plan-step.done { color: rgba(46,204,113,0.7); }
    .plan-step.doing { color: rgba(245,166,35,0.8); font-weight: 500; }

    /* Agent items */
    .agent-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 12px; margin-bottom: 6px;
      border-radius: 10px; border: 1px solid rgba(255,255,255,0.04);
      background: rgba(255,255,255,0.02);
    }
    .agent-avatar {
      width: 28px; height: 28px; border-radius: 50%;
      background: linear-gradient(135deg, rgba(74,158,255,0.4), rgba(245,166,35,0.3));
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 600;
    }
    .agent-name { font-size: 12px; font-weight: 500; }
    .agent-mood { font-size: 10px; color: rgba(255,255,255,0.3); margin-top: 2px; }
    .agent-kill {
      margin-left: auto; width: 22px; height: 22px; border-radius: 50%;
      background: rgba(231,76,60,0.1); border: 1px solid rgba(231,76,60,0.2);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; font-size: 9px; color: rgba(231,76,60,0.6);
      transition: all 0.2s; opacity: 0;
    }
    .agent-item:hover .agent-kill { opacity: 1; }
    .agent-kill:hover { background: rgba(231,76,60,0.25); }

    /* Control grid */
    .ctrl-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
    .ctrl-cell {
      padding: 14px 10px; text-align: center;
      border-radius: 10px; border: 1px solid rgba(255,255,255,0.04);
      background: rgba(255,255,255,0.02); cursor: pointer;
      font-size: 11px; font-weight: 500; transition: all 0.2s;
    }
    .ctrl-cell:hover {
      background: rgba(74,158,255,0.08);
      border-color: rgba(74,158,255,0.2);
      transform: translateY(-1px);
    }

    /* ─── Center ────────────────────────────────────────── */
    #center {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      position: relative;
    }

    /* Orb */
    #orb-wrap {
      position: relative; width: 300px; height: 300px;
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 28px;
    }
    #orb-canvas {
      position: absolute; inset: 0; width: 100%; height: 100%;
    }
    #orb-core {
      width: 108px; height: 108px; border-radius: 50%;
      background: radial-gradient(circle at 38% 38%, rgba(80,140,240,0.9), rgba(20,50,110,0.95));
      box-shadow: 0 0 50px rgba(74,130,220,0.35), 0 0 100px rgba(74,130,220,0.15), inset 0 0 25px rgba(255,255,255,0.08);
      display: flex; align-items: center; justify-content: center;
      transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
      z-index: 2;
    }
    #orb-core.speaking {
      background: radial-gradient(circle at 38% 38%, rgba(255,200,60,0.95), rgba(180,110,20,0.95));
      box-shadow: 0 0 70px rgba(245,166,35,0.5), 0 0 140px rgba(245,166,35,0.2), inset 0 0 25px rgba(255,255,255,0.15);
      transform: scale(1.07);
    }
    #orb-core.listening {
      background: radial-gradient(circle at 38% 38%, rgba(100,170,255,0.95), rgba(30,80,170,0.95));
      box-shadow: 0 0 60px rgba(74,158,255,0.45), 0 0 120px rgba(74,158,255,0.2);
      transform: scale(1.04);
    }
    #orb-core.thinking {
      animation: thinkPulse 1.2s ease-in-out infinite alternate;
    }
    #orb-core.error {
      background: radial-gradient(circle at 38% 38%, rgba(255,100,100,0.95), rgba(140,40,40,0.95));
      box-shadow: 0 0 70px rgba(231,76,60,0.5);
    }
    @keyframes thinkPulse {
      from { box-shadow: 0 0 60px rgba(100,180,255,0.4), 0 0 120px rgba(100,180,255,0.15); }
      to { box-shadow: 0 0 90px rgba(140,200,255,0.55), 0 0 180px rgba(140,200,255,0.2); }
    }
    #orb-glyph { font-size: 34px; transition: all 0.3s; }
    #orb-label {
      position: absolute; bottom: 18px; left: 50%; transform: translateX(-50%);
      font-size: 10px; font-weight: 500; letter-spacing: 0.12em;
      color: rgba(255,255,255,0.3); white-space: nowrap;
      background: rgba(7,7,13,0.6); padding: 3px 12px; border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.05);
    }

    /* Ring */
    #ring {
      position: absolute; inset: -24px; border-radius: 50%;
      border: 1px solid rgba(74,158,255,0.12);
      opacity: 0; transition: opacity 0.4s;
    }
    #ring.active { opacity: 1; animation: ringBreath 3s ease-in-out infinite; }
    @keyframes ringBreath {
      0%,100% { transform: scale(1); opacity: 0.6; }
      50% { transform: scale(1.08); opacity: 0.2; }
    }

    /* Chat */
    #chat {
      width: 88%; max-width: 460px; position: relative;
    }
    #chat-row {
      display: flex; align-items: center; gap: 8px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 28px; padding: 6px 6px 6px 20px;
      transition: all 0.3s;
    }
    #chat-row:focus-within {
      border-color: rgba(74,158,255,0.25);
      background: rgba(255,255,255,0.04);
      box-shadow: 0 0 30px rgba(74,130,220,0.08);
    }
    #chat-input {
      flex: 1; background: none; border: none; outline: none;
      color: #fff; font-size: 14px; font-family: inherit;
    }
    #chat-input::placeholder { color: rgba(255,255,255,0.2); }
    .c-btn {
      width: 38px; height: 38px; border-radius: 50%; border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s; flex-shrink: 0;
    }
    #mic {
      background: rgba(74,158,255,0.15); color: rgba(74,158,255,0.8);
    }
    #mic:hover { background: rgba(74,158,255,0.25); transform: scale(1.06); }
    #mic.recording { background: rgba(231,76,60,0.2); color: rgba(231,76,60,0.9); animation: micPulse 1s ease-in-out infinite; }
    @keyframes micPulse { 0%,100%{box-shadow:0 0 0 0 rgba(231,76,60,0.4)} 50%{box-shadow:0 0 0 10px rgba(231,76,60,0)} }
    #send {
      background: rgba(74,158,255,0.15); color: rgba(74,158,255,0.8);
    }
    #send:hover { background: rgba(74,158,255,0.3); }
    .c-btn svg { width: 16px; height: 16px; fill: currentColor; }

    #sub {
      text-align: center; margin-top: 12px;
      font-size: 12px; color: rgba(255,255,255,0.22);
      min-height: 18px; transition: all 0.4s;
    }
    #sub.agent { color: rgba(245,166,35,0.65); font-style: italic; }

    /* Center popup overlay */
    #center-popup {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      background: rgba(10,10,20,0.92); border: 1px solid rgba(255,255,255,0.07);
      border-radius: 20px; padding: 20px 24px; max-width: 360px; width: 90%;
      backdrop-filter: blur(30px); display: none; z-index: 50;
      box-shadow: 0 24px 80px rgba(0,0,0,0.7);
    }
    #center-popup.show { display: block; animation: popIn 0.25s cubic-bezier(0.34, 1.56, 0.64, 1); }
    @keyframes popIn { from{opacity:0;transform:translate(-50%,-50%) scale(0.88)} to{opacity:1;transform:translate(-50%,-50%) scale(1)} }
    #cp-title { font-size: 13px; font-weight: 600; margin-bottom: 6px; }
    #cp-msg { font-size: 12px; color: rgba(255,255,255,0.45); line-height: 1.6; }
    #cp-close {
      position: absolute; top: 12px; right: 12px;
      width: 24px; height: 24px; border-radius: 50%;
      background: rgba(255,255,255,0.05); border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; color: rgba(255,255,255,0.3);
    }
    #cp-close:hover { background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.7); }

    /* ─── Right Panel ────────────────────────────────────── */
    #right-panel {
      border-left: 1px solid rgba(255,255,255,0.04);
      display: flex; flex-direction: column; overflow: hidden;
    }

    #agent-block { padding: 16px; border-bottom: 1px solid rgba(255,255,255,0.04); }
    .agent-status {
      display: flex; align-items: center; gap: 12px;
    }
    .as-icon {
      width: 36px; height: 36px; border-radius: 50%;
      background: linear-gradient(135deg, rgba(74,158,255,0.3), rgba(245,166,35,0.2));
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
      animation: statusPulse 2.5s ease-in-out infinite alternate;
    }
    @keyframes statusPulse {
      from { box-shadow: 0 0 12px rgba(74,158,255,0.2); }
      to { box-shadow: 0 0 22px rgba(74,158,255,0.4); }
    }
    .as-info {}
    .as-label { font-size: 10px; color: rgba(255,255,255,0.25); letter-spacing: 0.08em; text-transform: uppercase; }
    .as-text { font-size: 13px; font-weight: 500; margin-top: 2px; transition: color 0.3s; }
    .as-text.thinking { color: rgba(245,166,35,0.85); }
    .as-text.speaking { color: rgba(74,158,255,0.85); }

    #log { flex: 1; overflow-y: auto; padding: 10px 12px; }
    #log::-webkit-scrollbar { width: 3px; }
    #log::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.05); border-radius: 2px; }

    .log-e {
      display: flex; gap: 7px; margin-bottom: 5px; padding: 7px 9px;
      border-radius: 8px; background: rgba(255,255,255,0.015);
      font-size: 11px; animation: logSlide 0.2s ease;
    }
    @keyframes logSlide { from{opacity:0;transform:translateX(8px)} to{opacity:1;transform:translateX(0)} }
    .log-t { color: rgba(255,255,255,0.18); flex-shrink: 0; font-family: 'JetBrains Mono', monospace; font-size: 10px; margin-top: 1px; }
    .log-badge {
      padding: 1px 5px; border-radius: 4px; font-size: 9px; font-weight: 600; flex-shrink: 0; align-self: flex-start;
    }
    .log-badge.action { background: rgba(74,158,255,0.15); color: rgba(74,158,255,0.7); }
    .log-badge.think { background: rgba(245,166,35,0.12); color: rgba(245,166,35,0.65); }
    .log-badge.file { background: rgba(46,204,113,0.12); color: rgba(46,204,113,0.65); }
    .log-badge.err { background: rgba(231,76,60,0.12); color: rgba(231,76,60,0.65); }
    .log-badge.web { background: rgba(155,89,182,0.12); color: rgba(180,120,210,0.7); }
    .log-msg { color: rgba(255,255,255,0.38); line-height: 1.45; }

    /* Calendar */
    #cal { border-top: 1px solid rgba(255,255,255,0.04); padding: 12px; }
    .cal-hdr { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
    .cal-mo { font-size: 11px; font-weight: 600; }
    .cal-nav { display: flex; gap: 3px; }
    .cal-nav button {
      width: 22px; height: 22px; border-radius: 50%;
      background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05);
      cursor: pointer; font-size: 10px; color: rgba(255,255,255,0.3);
      display: flex; align-items: center; justify-content: center;
    }
    .cal-nav button:hover { background: rgba(255,255,255,0.07); color: rgba(255,255,255,0.6); }
    .cal-g { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; }
    .cal-dh { text-align: center; font-size: 9px; color: rgba(255,255,255,0.15); padding: 3px 0; }
    .cal-d {
      aspect-ratio: 1; display: flex; align-items: center; justify-content: center;
      font-size: 10px; border-radius: 6px; cursor: pointer;
      color: rgba(255,255,255,0.25); transition: all 0.15s;
    }
    .cal-d:hover { background: rgba(255,255,255,0.05); color: rgba(255,255,255,0.7); }
    .cal-d.today { background: rgba(74,158,255,0.12); color: rgba(74,158,255,0.8); font-weight: 600; }
    .cal-d.ev { background: rgba(245,166,35,0.1); color: rgba(245,166,35,0.75); }
    .cal-d.past { opacity: 0.3; }

    /* ─── Bottom Bar ─────────────────────────────────────── */
    #bottom {
      grid-column: 1 / -1;
      display: flex; align-items: center; padding: 0 20px; gap: 8px;
      border-top: 1px solid rgba(255,255,255,0.04);
      font-size: 11px;
    }
    .b-tab {
      padding: 6px 12px; border-radius: 6px; cursor: pointer;
      color: rgba(255,255,255,0.2); transition: all 0.2s; font-weight: 500;
    }
    .b-tab:hover { color: rgba(255,255,255,0.5); }
    .b-tab.on { color: rgba(74,158,255,0.7); background: rgba(74,158,255,0.07); }
    #bottom-spacer { flex: 1; }
    #conn { display: flex; align-items: center; gap: 5px; color: rgba(255,255,255,0.2); }
    .conn-dot {
      width: 5px; height: 5px; border-radius: 50%;
      background: #2ecc71; box-shadow: 0 0 5px #2ecc71;
    }

    /* ─── Floating Layers ───────────────────────────────── */
    #floater {
      position: fixed; z-index: 200; display: none;
    }
    #floater.show { display: block; }

    /* Virtual keyboard */
    #vk {
      bottom: 70px; left: 50%; transform: translateX(-50%);
      width: min(700px, 95vw); background: rgba(8,8,18,0.95);
      border: 1px solid rgba(255,255,255,0.07); border-radius: 16px;
      backdrop-filter: blur(30px); padding: 14px; box-shadow: 0 20px 60px rgba(0,0,0,0.7);
    }
    .vk-r { display: flex; gap: 5px; justify-content: center; margin-bottom: 5px; }
    .vk-k {
      min-width: 40px; height: 40px; border-radius: 8px;
      background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.06);
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; cursor: pointer; transition: all 0.12s;
      flex: 1; max-width: 60px;
    }
    .vk-k:hover { background: rgba(255,255,255,0.1); transform: translateY(-2px); }
    .vk-k:active { transform: translateY(1px); background: rgba(74,158,255,0.25); }
    .vk-k.sp { min-width: 70px; max-width: 90px; font-size: 11px; color: rgba(255,255,255,0.3); }
    .vk-k.space { min-width: 240px; max-width: none; flex: 2; }

    /* Drawing canvas */
    #draw-layer {
      top: 60px; left: 16px; right: 16px; bottom: 60px;
      background: rgba(8,8,18,0.97); border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.07);
      backdrop-filter: blur(30px); overflow: hidden;
    }
    #draw-hdr {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 16px; border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    #draw-hdr span { font-size: 12px; color: rgba(255,255,255,0.4); }
    #draw-canvas { width: 100%; height: calc(100% - 48px); display: block; cursor: crosshair; }
    #draw-close, #vk-close-btn {
      width: 28px; height: 28px; border-radius: 50%;
      background: rgba(255,255,255,0.05); border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; color: rgba(255,255,255,0.3);
    }
    #draw-close:hover, #vk-close-btn:hover { background: rgba(255,255,255,0.1); }

    /* Camera PiP */
    #cam-pip {
      position: fixed; bottom: 70px; right: 20px;
      width: 220px; height: 165px; border-radius: 12px;
      background: rgba(8,8,18,0.95); border: 1px solid rgba(255,255,255,0.07);
      overflow: hidden; z-index: 150; display: none;
    }
    #cam-pip.on { display: block; }
    #cam-video { width: 100%; height: 100%; object-fit: cover; }

    /* Agent popup */
    #a-popup {
      top: 50%; left: 50%; transform: translate(-50%, -50%);
      width: min(380px, 90vw); background: rgba(8,8,18,0.97);
      border: 1px solid rgba(255,255,255,0.07); border-radius: 20px;
      padding: 28px 24px; backdrop-filter: blur(30px);
      box-shadow: 0 24px 80px rgba(0,0,0,0.8);
    }
    .a-pop-icon { font-size: 28px; text-align: center; margin-bottom: 10px; }
    .a-pop-title { font-size: 14px; font-weight: 600; text-align: center; margin-bottom: 8px; }
    .a-pop-msg { font-size: 12px; color: rgba(255,255,255,0.4); text-align: center; line-height: 1.6; margin-bottom: 16px; }
    .a-pop-input {
      width: 100%; padding: 10px 14px; border-radius: 10px;
      background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.07);
      color: #fff; font-size: 13px; outline: none; margin-bottom: 12px;
      font-family: inherit;
    }
    .a-pop-input:focus { border-color: rgba(74,158,255,0.3); }
    .a-pop-btns { display: flex; gap: 8px; }
    .a-pop-btn {
      flex: 1; padding: 10px; border-radius: 10px; border: none;
      font-size: 12px; font-weight: 500; cursor: pointer; transition: all 0.2s;
    }
    .a-pop-btn.pri { background: rgba(74,158,255,0.2); color: rgba(74,158,255,0.9); }
    .a-pop-btn.pri:hover { background: rgba(74,158,255,0.3); }
    .a-pop-btn.sec { background: rgba(255,255,255,0.04); color: rgba(255,255,255,0.5); }
    .a-pop-btn.sec:hover { background: rgba(255,255,255,0.08); }

    /* Focus overlay */
    #focus-overlay {
      position: fixed; inset: 0; z-index: 99;
      background: rgba(0,0,0,0.75); backdrop-filter: blur(4px);
      display: none;
    }
    #focus-overlay.on { display: block; }
  </style>
</head>
<body>

<div id="bg"></div>

<div id="app">
  <!-- Top -->
  <div id="topbar">
    <div id="logo">JARVIS <span>●</span></div>
    <div id="top-actions">
      <button class="action-btn" id="btn-voice" title="Voice">🎤</button>
      <button class="action-btn" id="btn-cam" title="Draw">✏️</button>
      <button class="action-btn" id="btn-kbd" title="Keyboard">⌨</button>
      <button class="action-btn danger" id="btn-stop" title="Stop">⏹</button>
      <button class="action-btn" id="btn-focus" title="Focus">◉</button>
    </div>
  </div>

  <!-- Left Panel -->
  <div id="left-panel">
    <div class="panel-tabs">
      <div class="p-tab active" data-t="tasks">Tasks</div>
      <div class="p-tab" data-t="plan">Plan</div>
      <div class="p-tab" data-t="agents">Agents</div>
      <div class="p-tab" data-t="tools">Tools</div>
    </div>
    <div id="left-content"></div>
  </div>

  <!-- Center -->
  <div id="center">
    <div id="orb-wrap">
      <canvas id="orb-canvas"></canvas>
      <div id="ring"></div>
      <div id="orb-core"><span id="orb-glyph">🧠</span></div>
      <div id="orb-label">READY</div>
    </div>

    <div id="chat">
      <div id="chat-row">
        <input id="chat-input" placeholder="Ask anything..." autocomplete="off" spellcheck="false">
        <button class="c-btn" id="mic">
          <svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5.91-3c-.49 0-.9.36-.98.85C16.52 14.2 14.47 16 12 16s-4.52-1.8-4.93-4.15c-.08-.49-.49-.85-.98-.85-.61 0-1.09.54-1 1.14.49 3 2.89 5.35 5.91 5.78V20c0 .55.45 1 1 1s1-.45 1-1v-2.08c3.02-.43 5.42-2.78 5.91-5.78.1-.6-.39-1.14-1-1.14z"/></svg>
        </button>
        <button class="c-btn" id="send">
          <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
        </button>
      </div>
      <div id="sub">Ready</div>
    </div>

    <div id="center-popup">
      <button id="cp-close">✕</button>
      <div id="cp-title"></div>
      <div id="cp-msg"></div>
    </div>
  </div>

  <!-- Right Panel -->
  <div id="right-panel">
    <div id="agent-block">
      <div class="agent-status">
        <div class="as-icon">🤖</div>
        <div class="as-info">
          <div class="as-label">Agent</div>
          <div class="as-text" id="as-text">Idle</div>
        </div>
      </div>
    </div>
    <div id="log"></div>
    <div id="cal">
      <div class="cal-hdr">
        <div class="cal-mo" id="cal-mo">March 2026</div>
        <div class="cal-nav">
          <button id="cal-prev">‹</button>
          <button id="cal-next">›</button>
        </div>
      </div>
      <div class="cal-g" id="cal-g"></div>
    </div>
  </div>

  <!-- Bottom -->
  <div id="bottom">
    <div class="b-tab on" data-v="main">Main</div>
    <div class="b-tab" data-v="agents">Agents</div>
    <div class="b-tab" data-v="files">Files</div>
    <div class="b-tab" data-v="logs">Logs</div>
    <div class="b-tab" data-v="sched">Schedule</div>
    <div id="bottom-spacer"></div>
    <div id="conn"><div class="conn-dot"></div><span>Connected</span></div>
  </div>
</div>

<!-- Floating layers -->
<div id="focus-overlay"></div>

<!-- Virtual Keyboard -->
<div id="floater" id="vk">
  <div id="vk" style="bottom:70px;left:50%;transform:translateX(-50%);width:min(700px,95vw);background:rgba(8,8,18,0.95);border:1px solid rgba(255,255,255,0.07);border-radius:16px;backdrop-filter:blur(30px);padding:14px;box-shadow:0 20px 60px rgba(0,0,0,0.7);position:fixed;z-index:200;display:none;">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">
      <span style="font-size:11px;color:rgba(255,255,255,0.3);">Virtual Keyboard</span>
      <button id="vk-close-btn">✕</button>
    </div>
    <div id="vk-keys"></div>
  </div>
</div>

<!-- Drawing -->
<div id="floater" id="draw-wrap">
  <div id="draw-layer" style="top:60px;left:16px;right:16px;bottom:60px;position:fixed;z-index:200;display:none;">
    <div id="draw-hdr">
      <span>✏️ Drawing</span>
      <button id="draw-close">✕</button>
    </div>
    <canvas id="draw-canvas"></canvas>
  </div>
</div>

<!-- Camera PiP -->
<div id="cam-pip"><video id="cam-video" autoplay playsinline muted></video></div>

<!-- Agent Popup -->
<div id="floater" id="a-popup-wrap">
  <div id="a-popup" style="display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:min(380px,90vw);background:rgba(8,8,18,0.97);border:1px solid rgba(255,255,255,0.07);border-radius:20px;padding:28px 24px;backdrop-filter:blur(30px);z-index:200;box-shadow:0 24px 80px rgba(0,0,0,0.8);">
    <div class="a-pop-icon" id="a-pop-icon">🔐</div>
    <div class="a-pop-title" id="a-pop-title">Password Required</div>
    <div class="a-pop-msg" id="a-pop-msg">Enter password to continue</div>
    <input type="password" class="a-pop-input" id="a-pop-input" placeholder="••••••••">
    <div class="a-pop-btns">
      <button class="a-pop-btn sec" id="a-pop-cancel">Cancel</button>
      <button class="a-pop-btn pri" id="a-pop-confirm">Confirm</button>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════
// JARVIS v2 — Minimal, Pure, Perfect
// ═══════════════════════════════════════════════════════
const J = {
  s: {
    orb: 'idle', voice: false, cam: false, kbd: false, focus: false,
    draw: false, stream: null, drawer: null,
    plan: null, tasks: [], agents: [], tools: [], logs: [],
    calEv: [], cMo: new Date().getMonth(), cYr: new Date().getFullYear(),
    popCB: null,
  },
  P: [], ctx: null, cvs: null, cx: 0, cy: 0, R: 0,

  init() {
    this.initOrb();
    this.initTabs();
    this.initChat();
    this.initKB();
    this.initCal();
    this.render('tasks');
    this.boot();
  },

  // ─── Orb ─────────────────────────────────────────────
  initOrb() {
    this.cvs = document.getElementById('orb-canvas');
    this.ctx = this.cvs.getContext('2d');
    this.resize();
    window.addEventListener('resize', () => this.resize());
    const n = window.innerWidth < 800 ? 160 : 260;
    for (let i = 0; i < n; i++) {
      const a = Math.random() * Math.PI * 2;
      const d = this.R * (0.35 + Math.random() * 0.65);
      this.P.push({ a, d, x: this.cx + Math.cos(a)*d, y: this.cy + Math.sin(a)*d,
        v: (Math.random()-0.5)*0.3, s: 1 + Math.random()*2,
        al: 0.3 + Math.random()*0.5, ph: Math.random()*Math.PI*2,
        sp: 0.001 + Math.random()*0.006 });
    }
    this.loop();
  },
  resize() {
    const r = this.cvs.getBoundingClientRect();
    const d = devicePixelRatio || 1;
    this.cvs.width = r.width * d; this.cvs.height = r.height * d;
    this.ctx.scale(d, d);
    this.cx = r.width/2; this.cy = r.height/2; this.R = Math.min(r.width,r.height)/2 - 12;
  },
  loop() {
    const {ctx, cvs} = this;
    const r = cvs.getBoundingClientRect();
    ctx.clearRect(0,0,r.width,r.height);
    const T = Date.now()*0.001;
    const spd = this.s.orb === 'thinking' ? 3 : this.s.orb === 'speaking' ? 2.2 : 1;
    const C = { idle:[74,158,255], listening:[100,170,255], speaking:[255,200,60], thinking:[130,195,255], error:[231,76,60] }[this.s.orb];
    const [cr,cg,cb] = C;

    // Glow
    const g = ctx.createRadialGradient(this.cx, this.cy, this.R*0.4, this.cx, this.cy, this.R*1.3);
    g.addColorStop(0, `rgba(${cr},${cg},${cb},${this.s.orb==='idle'?0.18:0.28})`);
    g.addColorStop(1,'transparent');
    ctx.fillStyle = g; ctx.fillRect(0,0,r.width,r.height);

    for (const p of this.P) {
      p.a += p.sp * spd; p.ph += 0.018 * spd;
      const br = this.s.orb === 'speaking' ? Math.sin(p.ph*3)*14 : this.s.orb === 'thinking' ? Math.sin(p.ph*2)*7 : 0;
      const tx = this.cx + Math.cos(p.a) * (p.d + br);
      const ty = this.cy + Math.sin(p.a) * (p.d + br);
      p.x += (tx - p.x) * 0.07; p.y += (ty - p.y) * 0.07;
      if (this.s.orb === 'speaking') { p.x += (Math.random()-0.5)*2.5; p.y += (Math.random()-0.5)*2.5; }
      const al = p.al * (0.65 + Math.sin(p.ph)*0.35);
      const sz = p.s * (this.s.orb === 'speaking' ? 1.4 : 1);
      ctx.beginPath(); ctx.arc(p.x, p.y, sz, 0, Math.PI*2);
      ctx.fillStyle = `rgba(${cr},${cg},${cb},${al})`; ctx.fill();
    }
    requestAnimationFrame(() => this.loop());
  },
  orb(st) {
    this.s.orb = st;
    const core = document.getElementById('orb-core');
    const ring = document.getElementById('ring');
    const label = document.getElementById('orb-label');
    const glyph = document.getElementById('orb-glyph');
    const m = { idle:['🧠','READY',''], listening:['👂','LISTENING','listening'], speaking:['💬','SPEAKING','speaking'], thinking:['💭','THINKING','thinking'], error:['⚠','ERROR','error'] };
    const [ic, lb, cl] = m[st] || m.idle;
    core.className = st; ring.className = st !== 'idle' ? 'active' : '';
    glyph.textContent = ic; label.textContent = lb;
    const ast = document.getElementById('as-text');
    ast.textContent = lb; ast.className = 'as-text ' + cl;
  },

  // ─── Tabs ─────────────────────────────────────────────
  initTabs() {
    document.querySelectorAll('.p-tab').forEach(t => {
      t.addEventListener('click', () => {
        document.querySelectorAll('.p-tab').forEach(x => x.classList.remove('active'));
        t.classList.add('active');
        this.render(t.dataset.t);
      });
    });
    document.querySelectorAll('.b-tab').forEach(t => {
      t.addEventListener('click', () => {
        document.querySelectorAll('.b-tab').forEach(x => x.classList.remove('on'));
        t.classList.add('on');
      });
    });
  },

  render(what) {
    const c = document.getElementById('left-content');
    if (what === 'tasks') {
      const ts = this.s.tasks.length ? this.s.tasks : [
        {n:'Monitor services',s:'running',d:'Check 8 ports / 15min'},
        {n:'Ruche collection',s:'pending',d:'GitHub, arXiv, HuggingFace daily'},
        {n:'Fine-tune Orret',s:'pending',d:'Qwen2.5-7B on Colab TPU'},
        {n:'NEXUS v1.0',s:'done',d:'Complete'},
      ];
      c.innerHTML = ts.map(t => `
        <div class="task">
          <div class="task-head">
            <div class="t-dot ${t.s}"></div>
            <div class="t-name">${t.n}</div>
            <span class="t-tag ${t.s}">${t.s}</span>
          </div>
          <div class="t-desc">${t.d}</div>
        </div>`).join('');
    } else if (what === 'plan') {
      const p = this.s.plan || {
        t:'SOE System Bootstrap', pr:65,
        st:[{x:'Infrastructure',d:1},{x:'Data pipeline',d:1},{x:'Provider system',d:1},{x:'Fine-tune model',d:0},{x:'ARIA/SOMA',d:0},{x:'Production',d:0}]
      };
      const cur = p.st.findIndex(x=>!x.d);
      c.innerHTML = `<div class="plan-title">${p.t}</div>
        <div class="plan-bar"><div class="plan-fill" style="width:${p.pr}%"></div></div>
        ${p.st.map((s,i)=>`<div class="plan-step ${s.d?'done':i===cur?'doing':''}">${s.d?'✓':i===cur?'▶':'○'} ${s.x}</div>`).join('')}`;
    } else if (what === 'agents') {
      const ag = this.s.agents.length ? this.s.agents : [
        {n:'CLAW-PRIME',m:'Running — Infrastructure',a:'C'},
        {n:'Research-Agent',m:'Idle — Awaiting tasks',a:'R'},
      ];
      c.innerHTML = ag.map(a => `
        <div class="agent-item">
          <div class="agent-avatar">${a.a}</div>
          <div><div class="agent-name">${a.n}</div><div class="agent-mood">${a.m}</div></div>
          <div class="agent-kill">✕</div>
        </div>`).join('');
    } else if (what === 'tools') {
      const btns = this.s.tools.length ? this.s.tools : [
        {l:'🔄 Restart NEXUS',a:'restart_nexus'}, {l:'📦 Run Ruche',a:'run_ruche'},
        {l:'🧠 Fine-tune',a:'run_ft'}, {l:'📊 Stats',a:'stats'},
        {l:'🗑 Clear logs',a:'clear_logs'}, {l:'⚡ Quick task',a:'quick'},
      ];
      c.innerHTML = `<div class="ctrl-grid">${btns.map(b=>`<div class="ctrl-cell" data-a="${b.a}">${b.l}</div>`).join('')}</div>`;
      c.querySelectorAll('.ctrl-cell').forEach(el => el.addEventListener('click', () => this.doTool(el.dataset.a)));
    }
  },

  doTool(a) { this.log('action', `Tool: ${a}`); this.send(`[TOOL] ${a}`); },

  // ─── Chat ─────────────────────────────────────────────
  initChat() {
    const inp = document.getElementById('chat-input');
    const snd = document.getElementById('send');
    const mc = document.getElementById('mic');
    const go = () => { const t = inp.value.trim(); if(t) { this.send(t); inp.value=''; } };
    snd.addEventListener('click', go);
    inp.addEventListener('keydown', e => { if(e.key === 'Enter') go(); });
    mc.addEventListener('click', () => {
      if (!this.s.voice) { this.startVoice(); } else { this.stopVoice(); }
    });
    document.getElementById('cp-close').addEventListener('click', () => {
      document.getElementById('center-popup').classList.remove('show');
    });
  },
  send(t) {
    this.log('action', `You: ${t.substring(0,80)}${t.length>80?'...':''}`);
    const sb = document.getElementById('sub');
    sb.textContent = `You: ${t.substring(0,60)}${t.length>60?'...':''}`;
    sb.classList.remove('agent');
    this.orb('thinking');
    setTimeout(() => {
      const r = ['Processing your request...', 'All systems nominal. Ready.', 'Running Ruche collection.', 'Analyzing data...', 'Building OrretCrypt v1...'];
      const msg = r[Math.floor(Math.random()*r.length)];
      this.log('think', msg);
      sb.textContent = 'JARVIS: ' + msg; sb.classList.add('agent');
      this.orb('speaking');
      setTimeout(() => this.orb('idle'), 2500);
    }, 1200);
  },

  // ─── Voice ────────────────────────────────────────────
  async startVoice() {
    try {
      this.s.stream = await navigator.mediaDevices.getUserMedia({audio:true});
      this.s.voice = true;
      document.getElementById('mic').classList.add('recording');
      document.getElementById('btn-voice').classList.add('on');
      this.orb('listening');
      const ac = new (window.AudioContext||webkitAudioContext)();
      const an = ac.createAnalyser(); an.fftSize = 256;
      ac.createMediaStreamSource(this.s.stream).connect(an);
      const loop = () => {
        if (!this.s.voice) return;
        const d = new Uint8Array(an.frequencyBinCount);
        an.getByteFrequencyData(d);
        const av = d.reduce((a,b)=>a+b,0)/d.length;
        if (av > 25) this.orb('listening');
        setTimeout(loop, 80);
      };
      loop();
    } catch(e) { this.log('err', 'Microphone access denied'); }
  },
  stopVoice() {
    if (this.s.stream) this.s.stream.getTracks().forEach(t=>t.stop());
    this.s.voice = false;
    document.getElementById('mic').classList.remove('recording');
    document.getElementById('btn-voice').classList.remove('on');
    this.orb('idle');
  },

  // ─── Keyboard ─────────────────────────────────────────
  initKB() {
    const rows = [['`','1','2','3','4','5','6','7','8','9','0','-','='],['Tab','q','w','e','r','t','y','u','i','o','p','[',']','\\'],
      ['a','s','d','f','g','h','j','k','l',';',"'",'Enter'],['Shift','z','x','c','v','b','n','m',',','.','/'],
      ['Ctrl','Alt','Space']];
    const kdiv = document.getElementById('vk-keys');
    rows.forEach(row => {
      const r = document.createElement('div'); r.className = 'vk-r';
      row.forEach(k => {
        const b = document.createElement('div');
        b.className = 'vk-k' + ['Tab','Enter','Shift','Ctrl','Alt'].includes(k) ? ' sp' : k==='Space' ? ' space' : '';
        b.textContent = k;
        b.addEventListener('click', () => {
          const inp = document.getElementById('chat-input');
          if (k === 'Backspace') inp.value = inp.value.slice(0,-1);
          else if (k === 'Tab') inp.value += '  ';
          else if (k.length === 1) inp.value += k;
          inp.focus();
        });
        r.appendChild(b);
      });
      kdiv.appendChild(r);
    });

    // Events
    document.getElementById('btn-kbd').addEventListener('click', () => this.toggleKB());
    document.getElementById('vk-close-btn').addEventListener('click', () => this.toggleKB());
    document.getElementById('btn-cam').addEventListener('click', () => this.toggleDraw());
    document.getElementById('draw-close').addEventListener('click', () => this.toggleDraw());
    document.getElementById('btn-voice').addEventListener('click', () => this.s.voice ? this.stopVoice() : this.startVoice());
    document.getElementById('btn-stop').addEventListener('click', () => { if(confirm('Stop agent?')) this.emergencyStop(); });
    document.getElementById('btn-focus').addEventListener('click', () => this.toggleFocus());
    document.getElementById('focus-overlay').addEventListener('click', () => this.toggleFocus());
    document.getElementById('a-pop-cancel')?.addEventListener('click', () => this.hidePopup());
    document.getElementById('a-pop-confirm')?.addEventListener('click', () => this.popOK());
    document.getElementById('cal-prev').addEventListener('click', () => { if(this.s.cMo===0){this.s.cMo=11;this.s.cYr--;}else this.s.cMo--; this.renderCal(); });
    document.getElementById('cal-next').addEventListener('click', () => { if(this.s.cMo===11){this.s.cMo=0;this.s.cYr++;}else this.s.cMo++; this.renderCal(); });
  },
  toggleKB() {
    const vk = document.getElementById('vk');
    const btn = document.getElementById('btn-kbd');
    this.s.kbd = !this.s.kbd;
    vk.style.display = this.s.kbd ? 'block' : 'none';
    btn.classList.toggle('on', this.s.kbd);
  },
  toggleDraw() {
    const dl = document.getElementById('draw-layer');
    const btn = document.getElementById('btn-cam');
    this.s.draw = !this.s.draw;
    dl.style.display = this.s.draw ? 'block' : 'none';
    btn.classList.toggle('on', this.s.draw);
    if (this.s.draw) this.initDraw();
  },
  initDraw() {
    const cv = document.getElementById('draw-canvas');
    const wrap = document.getElementById('draw-layer');
    cv.width = wrap.clientWidth; cv.height = wrap.clientHeight - 48;
    const d = cv.getContext('2d');
    d.strokeStyle = '#4a9eff'; d.lineWidth = 2.5; d.lineCap = 'round';
    let dr = false, lx=0, ly=0;
    const down = e => { dr=true; const r=cv.getBoundingClientRect();
      lx=e.clientX-r.left; ly=e.clientY-r.top; };
    const mv = e => { if(!dr)return; const r=cv.getBoundingClientRect(), x=e.clientX-r.left, y=e.clientY-r.top;
      d.beginPath(); d.moveTo(lx,ly); d.lineTo(x,y); d.stroke(); lx=x; ly=y; };
    cv.addEventListener('mousedown',down); cv.addEventListener('mousemove',mv);
    cv.addEventListener('mouseup',()=>dr=false); cv.addEventListener('mouseleave',()=>dr=false);
    cv.addEventListener('touchstart', e=>{e.preventDefault();const t=e.touches[0],r=cv.getBoundingClientRect();lx=t.clientX-r.left;ly=t.clientY-r.top;dr=true;});
    cv.addEventListener('touchmove', e=>{e.preventDefault();if(!dr)return;const t=e.touches[0],r=cv.getBoundingClientRect(),x=t.clientX-r.left,y=t.clientY-r.top;d.beginPath();d.moveTo(lx,ly);d.lineTo(x,y);d.stroke();lx=x;ly=y;});
    cv.addEventListener('touchend',()=>dr=false);
  },
  toggleFocus() {
    this.s.focus = !this.s.focus;
    document.getElementById('focus-overlay').classList.toggle('on', this.s.focus);
    document.getElementById('btn-focus').classList.toggle('on', this.s.focus);
  },
  emergencyStop() { this.log('err','EMERGENCY STOP'); this.orb('error'); this.stopVoice(); this.toggleKB(false); this.toggleDraw(false); },

  // ─── Popup ────────────────────────────────────────────
  showPopup(ic, ti, msg, inp=false, cb=null) {
    document.getElementById('a-pop-icon').textContent = ic;
    document.getElementById('a-pop-title').textContent = ti;
    document.getElementById('a-pop-msg').textContent = msg;
    document.getElementById('a-pop-input').style.display = inp ? 'block' : 'none';
    if (inp) document.getElementById('a-pop-input').value = '';
    document.getElementById('a-popup').style.display = 'block';
    document.getElementById('a-popup').classList.add('show');
    this.s.popCB = cb;
    if (inp) document.getElementById('a-pop-input').focus();
  },
  hidePopup() { document.getElementById('a-popup').style.display = 'none'; document.getElementById('a-popup').classList.remove('show'); },
  popOK() {
    const v = document.getElementById('a-pop-input').value;
    this.hidePopup();
    if (this.s.popCB) this.s.popCB(v);
  },

  // ─── Log ───────────────────────────────────────────────
  log(type, msg) {
    const lg = document.getElementById('log');
    const t = new Date().toLocaleTimeString('en-GB',{hour12:false});
    const e = document.createElement('div'); e.className = 'log-e';
    e.innerHTML = `<span class="log-t">${t}</span><span class="log-badge ${type}">${type.toUpperCase()}</span><span class="log-msg">${msg}</span>`;
    lg.appendChild(e); lg.scrollTop = lg.scrollHeight;
    while (lg.children.length > 60) lg.removeChild(lg.firstChild);
    this.s.logs.push({t, type, msg});
  },

  // ─── Calendar ─────────────────────────────────────────
  initCal() { this.renderCal(); },
  renderCal() {
    const mo = ['January','February','March','April','May','June','July','August','September','October','November','December'];
    document.getElementById('cal-mo').textContent = `${mo[this.s.cMo]} ${this.s.cYr}`;
    const g = document.getElementById('cal-g');
    g.innerHTML = '';
    ['M','T','W','T','F','S','S'].forEach(d => { const e=document.createElement('div'); e.className='cal-dh'; e.textContent=d; g.appendChild(e); });
    const fd = new Date(this.s.cYr, this.s.cMo, 1).getDay();
    const off = fd===0 ? 6 : fd-1;
    for (let i=0;i<off;i++) g.appendChild(document.createElement('div'));
    const days = new Date(this.s.cYr, this.s.cMo+1, 0).getDate();
    const today = new Date();
    for (let d=1; d<=days; d++) {
      const e = document.createElement('div'); e.className='cal-d'; e.textContent=d;
      const ds = `${this.s.cYr}-${this.s.cMo}-${d}`;
      const isT = d===today.getDate()&&this.s.cMo===today.getMonth()&&this.s.cYr===today.getFullYear();
      if (isT) e.classList.add('today');
      if (this.s.calEv.some(ev=>ev.date===ds)) e.classList.add('ev');
      e.addEventListener('click', () => { const evs=this.s.calEv.filter(e=>e.date===ds); if(evs.length) this.showPopup('📅',ds,evs.map(x=>`• ${x.time} — ${x.title}`).join('\n')); });
      g.appendChild(e);
    }
  },

  // ─── Boot ──────────────────────────────────────────────
  boot() {
    this.orb('idle');
    this.log('action','JARVIS initialized');
    this.log('think','All systems nominal');
    this.log('file','Config loaded — 9 providers');
    this.log('web','NEXUS: 8/8 services online');
    this.s.calEv = [
      {date:`${this.s.cYr}-${this.s.cMo}-${new Date().getDate()}`,time:'09:00',title:'Daily check'},
      {date:`${this.s.cYr}-${this.s.cMo}-${new Date().getDate()}`,time:'14:00',title:'Ruche run'},
    ];
    this.renderCal();
  },
};

document.addEventListener('DOMContentLoaded', () => J.init());
</script>
